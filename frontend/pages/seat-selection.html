<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Select your preferred seats from the interactive seat map.">
  <title>Seat Selection — RailWay</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo"><span>RailWay</span></a>
      <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
      <div class="nav-links" id="nav-links"></div>
      <div class="nav-auth" id="nav-auth"></div>
    </div>
  </nav>

  <div class="page">
    <div class="page-container">
      <div class="page-header">
        <h1>Select Your Seats</h1>
        <p>Choose your preferred seats from the available options</p>
      </div>

      <div id="booking-info"></div>
      <div id="seat-container"></div>
      <div id="selection-summary" style="margin-top: 24px;">
        <p style="color: var(--text-muted);">Select seats from the map above</p>
      </div>
    </div>
  </div>

  <!-- Passenger Details Modal -->
  <div class="modal-overlay" id="passenger-modal">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-header">
        <h2>Passenger Details</h2>
        <button class="modal-close" onclick="closePassengerModal()">✕</button>
      </div>
      <div class="modal-body" id="passenger-forms" style="max-height: 60vh; overflow-y: auto;">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closePassengerModal()">Cancel</button>
        <button class="btn btn-primary" id="confirm-booking-btn" onclick="confirmBooking()">Confirm Booking</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/booking.js"></script>
</body>
</html>
