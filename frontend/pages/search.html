<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search for trains between any two stations. Check availability and fares.">
  <title>Search Trains — RailWay</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo"><span>RailWay</span></a>
      <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
      <div class="nav-links" id="nav-links"></div>
      <div class="nav-auth" id="nav-auth"></div>
    </div>
  </nav>

  <div class="page">
    <div class="page-container">
      <div class="page-header">
        <h1>Search Trains</h1>
        <p>Find trains between any two stations across India</p>
      </div>

      <div class="card" style="margin-bottom: 32px;">
        <form id="train-search-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">From Station</label>
              <input type="text" class="form-input" id="from-station" placeholder="City or station name"
                list="from-suggestions" required>
              <datalist id="from-suggestions"></datalist>
            </div>
            <div class="form-group">
              <label class="form-label">To Station</label>
              <input type="text" class="form-input" id="to-station" placeholder="City or station name"
                list="to-suggestions" required>
              <datalist id="to-suggestions"></datalist>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Journey Date</label>
              <input type="date" class="form-input" id="journey-date" required>
            </div>
            <div class="form-group" style="display: flex; align-items: flex-end;">
              <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="search-trains-btn">
                Search Trains
              </button>
            </div>
          </div>
        </form>
      </div>

      <div id="search-results">
        <div class="empty-state">
          <h3>Search for trains</h3>
          <p>Enter source and destination stations to find available trains</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/trains.js"></script>
</body>

</html>
