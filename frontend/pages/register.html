<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your RailWay account to start booking train tickets.">
  <title>Sign Up — RailWay</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <a href="/index.html" class="nav-logo" style="justify-content: center; margin-bottom: 32px;">
        <span>RailWay</span>
      </a>
      <h1>Create Account</h1>
      <p class="auth-subtitle">Sign up to start booking tickets</p>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="name" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-input" id="phone" placeholder="9876543210">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="confirm-password" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="register-btn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/pages/login.html">Login</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
