<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Check live train status, delays, and current location.">
  <title>Train Status — RailWay</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo"><span>RailWay</span></a>
      <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
      <div class="nav-links" id="nav-links"></div>
      <div class="nav-auth" id="nav-auth"></div>
    </div>
  </nav>

  <div class="page">
    <div class="page-container" style="max-width: 800px;">
      <div class="page-header">
        <h1>Train Status</h1>
        <p>Check live running status of any train</p>
      </div>

      <div class="card" style="margin-bottom: 32px;">
        <form id="status-form">
          <div class="form-group">
            <label class="form-label">Enter Train ID Number</label>
            <input type="text" class="form-input" id="status-query" placeholder="e.g. 1 (Rajdhani Express), 2 (Shatabdi Express)" required>
            <span class="form-hint">Enter the train ID (1-10 for seeded trains)</span>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;" id="check-status-btn">
                Check Status
          </button>
        </form>
      </div>

      <div id="status-container"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/trainStatus.js"></script>
</body>
</html>
