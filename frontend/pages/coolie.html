<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Book a coolie for luggage assistance at any railway station.">
  <title>Coolie Service — RailWay</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo"><span>RailWay</span></a>
      <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
      <div class="nav-links" id="nav-links"></div>
      <div class="nav-auth" id="nav-auth"></div>
    </div>
  </nav>

  <div class="page">
    <div class="page-container" style="max-width: 900px;">
      <div class="page-header">
        <h1>Coolie Service</h1>
        <p>Book a coolie for luggage assistance at any station</p>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Book a Coolie</span>
          </div>
          <form id="coolie-form">
            <div class="form-group">
              <label class="form-label">Station</label>
              <select class="form-select" id="coolie-station" required>
                <option value="">Select station</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Date</label>
              <input type="date" class="form-input" id="coolie-date" required>
            </div>
            <div class="form-group">
              <label class="form-label">Time (Optional)</label>
              <input type="time" class="form-input" id="coolie-time">
            </div>
            <div class="form-group">
              <label class="form-label">Platform No. (Optional)</label>
              <input type="text" class="form-input" id="coolie-platform" placeholder="e.g. 3">
            </div>
            <div
              style="background: var(--bg-input); border-radius: var(--radius-md); padding: 12px; margin-bottom: 16px;">
              <div style="display: flex; justify-content: space-between;">
                <span style="color: var(--text-secondary);">Service Charge</span>
                <span class="amount">₹150</span>
              </div>
            </div>
            <button type="submit" class="btn btn-accent" style="width: 100%;" id="book-coolie-btn">
              Book Coolie
            </button>
          </form>
        </div>

        <div>
          <h3 style="font-family: var(--font-heading); font-weight: 700; margin-bottom: 16px;">My Coolie Bookings</h3>
          <div id="coolie-bookings">
            <div class="loader">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/coolie.js"></script>
</body>

</html>
