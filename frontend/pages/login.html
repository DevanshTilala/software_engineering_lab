<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your RailWay account to manage bookings and track trains.">
  <title>Login — RailWay</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <a href="/index.html" class="nav-logo" style="justify-content: center; margin-bottom: 32px;">
        <span>RailWay</span>
      </a>
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account</p>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="login-btn">
          Login
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/pages/register.html">Sign Up</a>
      </div>

      <div class="auth-divider">Demo Accounts</div>
      <div style="font-size: 0.8rem; color: var(--text-muted); text-align: center; line-height: 1.8;">
        <strong>Admin:</strong> admin@railway.com / admin123<br>
        <strong>User:</strong> devansh@test.com / user123
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
