<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin panel for managing trains, bookings, and system status.">
  <title>Admin Panel — RailWay</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo"><span>RailWay</span></a>
      <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
      <div class="nav-links" id="nav-links"></div>
      <div class="nav-auth" id="nav-auth"></div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <button class="admin-sidebar-item active" data-section="dashboard" onclick="showSection('dashboard')">
        Dashboard
      </button>
      <button class="admin-sidebar-item" data-section="trains" onclick="showSection('trains')">
        Manage Trains
      </button>
      <button class="admin-sidebar-item" data-section="bookings" onclick="showSection('bookings')">
        All Bookings
      </button>
      <button class="admin-sidebar-item" data-section="add-train" onclick="showSection('add-train')">
        Add Train
      </button>
    </aside>
    <main class="admin-content" id="admin-content">
      <div class="loader">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>

</html>
